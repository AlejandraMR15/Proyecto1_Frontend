<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciudad Virtual — Menú Principal</title>
    <link rel="stylesheet" href="../estilos/styles.css">
    <link rel="stylesheet" href="../estilos/menu.css">
</head>
<body class="menu-body">

    <!-- ======= PANTALLA PRINCIPAL DEL MENÚ ======= -->
    <div id="pantalla-menu" class="pantalla activa">
        <div class="menu-contenedor">
            <h1 class="menu-titulo">Ciudad Virtual</h1>
            <p class="menu-subtitulo">Construye y gestiona tu propia ciudad</p>

            <div class="menu-botones">
                <!-- Solo se habilita si hay partida guardada -->
                <button id="btn-continuar" class="btn-menu" disabled>
                    Continuar partida
                    <span class="btn-hint" id="hint-continuar">No hay partida guardada</span>
                </button>

                <button id="btn-nueva" class="btn-menu">
                    Nueva partida
                </button>
            </div>
        </div>
    </div>

    <!-- ======= PANTALLA DEL FORMULARIO DE NUEVA PARTIDA ======= -->
    <div id="pantalla-formulario" class="pantalla">
        <div class="form-contenedor">
            <button id="btn-volver" class="btn-volver">← Volver</button>
            <h2 class="form-titulo">Nueva partida</h2>

            <div class="campo">
                <label for="input-alcalde">Nombre del alcalde</label>
                <input
                    type="text"
                    id="input-alcalde"
                    placeholder="Ej: María García"
                    maxlength="40"
                    autocomplete="off"
                />
            </div>

            <div class="campo">
                <label for="input-ciudad">Nombre de la ciudad</label>
                <input
                    type="text"
                    id="input-ciudad"
                    placeholder="Ej: Nueva Esperanza"
                    maxlength="40"
                    autocomplete="off"
                />
            </div>

            <!-- Buscador de ciudad geográfica de Colombia -->
            <div class="campo">
                <label for="input-region">Ciudad geográfica (Colombia)</label>
                <div class="autocomplete-wrap">
                    <input
                        type="text"
                        id="input-region"
                        placeholder="Escribe para buscar..."
                        autocomplete="off"
                    />
                    <div id="autocomplete-spinner" class="ac-spinner oculto">Cargando...</div>
                    <ul id="autocomplete-lista" class="ac-lista oculto"></ul>
                    <!-- Valor seleccionado real (objeto ciudad de la API) -->
                    <input type="hidden" id="region-seleccionada" />
                </div>
                <p id="region-error" class="campo-error oculto">Selecciona una ciudad de la lista</p>
            </div>

            <!-- Tamaño del mapa -->
            <div class="campo">
                <label for="slider-mapa">
                    Tamaño del mapa:
                    <span id="label-mapa">15 × 15</span>
                </label>
                <div class="slider-wrap">
                    <span class="slider-extremo">15</span>
                    <input
                        type="range"
                        id="slider-mapa"
                        min="15"
                        max="30"
                        value="15"
                        step="1"
                    />
                    <span class="slider-extremo">30</span>
                </div>
            </div>

            <!-- Duración de turno -->
            <div class="campo">
                <label for="input-turno">
                    Duración del turno (segundos)
                    <span class="campo-hint">Mínimo: 10 s</span>
                </label>
                <input
                    type="number"
                    id="input-turno"
                    value="10"
                    min="10"
                    step="1"
                />
            </div>

            <p id="form-error" class="campo-error oculto"></p>

            <button id="btn-crear" class="btn-menu btn-crear">Crear partida</button>
        </div>
    </div>

    <script type="module" src="../../negocio/menu.js"></script>
</body>
</html>
