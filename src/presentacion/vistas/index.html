<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciudad Virtual – Cuadrícula Isométrica</title>
    <link rel="stylesheet" href="../estilos/styles.css">
</head>
<body>
    <div id="top-bar">
        <span id="title"> Ciudad Virtual</span>
        <span id="grid-info">Cuadrícula 15 × 15 — Vista Isométrica</span>
    </div>

    <div id="viewport">
        <div id="canvas-wrap">
            <div id="iso-scene">
                <div id="iso-grid"></div>
            </div>
        </div>
    </div>

    <div id="zoom-controls">
        <button id="btn-zoom-in"  title="Acercar">+</button>
        <div id="zoom-label">100%</div>
        <button id="btn-zoom-out" title="Alejar">−</button>
        <button id="btn-zoom-reset" title="Restablecer" style="font-size:0.75rem">⌂</button>
    </div>

    <div id="tooltip"></div>

    <script type="module" src="../../negocio/grid.js"></script>
</body>
</html>
